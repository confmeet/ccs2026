        - name: "Lunch"
          time: "11:45am"
        - name: "Poster Session II" 
          time: "1:00pm"
        - name: "Coffee Break"
          time: "2:30pm"
        - name: "Breakout Sessions"
          time: "2:45pm"
        - name: "Coffee Break" 
          time: "4:15pm"
        - name: "Poster Session III & Reception" 
          time: "4:30pm"

    - name: "Tuesday, Sept. 15"
      schedule:
        - name: "Registration & Breakfast"
          time: "8:00am"
        - name: "Keynote III"
          time: "9:00am"
        - name: "Breakout Report Outs"
          time: "9:30am" 
        - name: "Coffee Break" 
          time: "10:00am"
        - name: "Poster Session IV"
          time: "10:15am" 
        - name: "Prof. Alan Sussman"
          photo: "/img/speakers/alan-sussman.jpg"
          bio: "Alan Sussman is a Professor in the Department of Computer Science at the University of Maryland, College Park, where he also serves as the Associate Chair for Undergraduate Education. He previously served as a Program Director at the NSF within the CISE Directorate. He focuses on parallel and distributed systems, high-performance computing, and computer science education."
          company: "University of Maryland, College Park"
