params:
  Name: "2026 NSF CSSI / Cyber Training / SCIPE PI Meeting"
  Description: "Annual PI meeting for the NSF CSSI, CyberTraining, and SCIPE programs."
  Date: "Sept. 13 - 15, 2026"
  Venue: "Bethesda North Marriott Hotel & Conference Center"
  Address: "5701 Marinelli Road"
  City: "Rockville"
  State: "MD"
  Images: ["/img/badge.jpg"]
  GoogleMapsKey: "AIzaSyDGEz9K7S1Dj9RdZk1UT44s4R9iWj1yB7k"

  Sections:
    - about
    - speakers
    - schedule
